name: Build & Release

# Runs whenever a tag like v1.0.0, v2.3.1, etc. is pushed.
on:
  push:
    tags:
      - 'v*.*.*'

# Needed so the action can publish to the GitHub release.
permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      # Paper 26.x requires Java 25.
      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: gradle

      # Downloads and caches Gradle 8.11.1 without needing a wrapper jar.
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.11.1'

      - name: Build plugin
        run: gradle build

      # Creates the GitHub release (if it doesn't exist) and uploads the JAR.
      # The release title and body are auto-generated from the tag.
      - name: Upload JAR to release
        uses: softprops/action-gh-release@v2
        with:
          files: build/libs/SpawnHelper-*.jar
          fail_on_unmatched_files: true
          generate_release_notes: true
