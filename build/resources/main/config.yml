# ─────────────────────────────────────────────────────────────────────────────
# SpawnHelper Configuration
# All settings can be toggled in-game with /sh gui
# ─────────────────────────────────────────────────────────────────────────────

# The name of the world that SpawnHelper protects.
spawn-world: "world"

settings:

  # ── Combat & Blocks ─────────────────────────────────────────────────────────

  # Prevent all damage to players (fall, fire, mobs, suffocation, etc.)
  no-damage: true

  # Prevent player-vs-player damage
  no-pvp: true

  # Prevent players from breaking blocks
  no-block-breaking: true

  # Prevent players from placing blocks
  no-block-placing: true

  # Allow players to interact with blocks (doors, chests, buttons, levers, etc.)
  allow-block-interaction: true

  # Disable player-to-player collision (uses scoreboard teams)
  no-collision: true

  # Freeze the hunger bar — players will not lose food level
  no-hunger: true

  # ── Items ───────────────────────────────────────────────────────────────────

  # Prevent players from dropping items (Q key)
  no-item-drop: false

  # Prevent players from picking up items
  no-item-pickup: false

  # ── World ───────────────────────────────────────────────────────────────────

  # Grant players flight when they enter the spawn world; revoke on leave
  allow-flight: false

  # Block natural mob spawning (hostile and passive)
  # Plugin/command spawns are still allowed
  no-mob-spawning: false

  # Prevent fire from spreading or burning blocks
  no-fire-spread: true

  # Prevent explosions from destroying blocks
  no-explosion-damage: true

  # ── Time lock ────────────────────────────────────────────────────────────────
  # Freeze the world time. Right-click the clock in /sh gui to cycle presets.
  # Presets: 0 = sunrise, 6000 = noon, 12000 = sunset, 18000 = midnight
  time-lock:
    enabled: false
    time: 6000

  # ── Weather lock ─────────────────────────────────────────────────────────────
  # Keep weather always clear (no rain or thunder)
  weather-lock: false

  # ── Gamemode enforcement ──────────────────────────────────────────────────────
  # Force a specific gamemode when players enter the spawn world.
  # Options: SURVIVAL, ADVENTURE, CREATIVE, SPECTATOR
  gamemode-enforcement:
    enabled: false
    gamemode: "ADVENTURE"
    # Restore the player's previous gamemode when they leave spawn
    restore-on-leave: true

  # ── Speed modifier ────────────────────────────────────────────────────────────
  # Apply custom movement speeds while in spawn. Restored on leave.
  # Range: 0.0–1.0  |  Defaults: walk = 0.2, fly = 0.1
  speed:
    enabled: false
    walk: 0.2
    fly: 0.1

  # ── Command blacklist ─────────────────────────────────────────────────────────
  # Block specific commands from being used inside the spawn world.
  # Players with spawnhelper.bypass are exempt.
  command-blacklist:
    enabled: false
    commands:
      - "kill"
      - "tp"
      - "teleport"

# ─────────────────────────────────────────────────────────────────────────────
# /spawn command behaviour
# The toggle (enabled) can also be flipped in /sh gui.
# ─────────────────────────────────────────────────────────────────────────────
spawn-command:
  enabled: true

  # true  = teleport to the world's spawn point (set with /setworldspawn)
  # false = teleport to the exact custom coordinates below
  use-world-spawn: true

  destination:
    x: 0.5
    y: 64.0
    z: 0.5
    yaw: 0.0
    pitch: 0.0

  # Seconds to wait before teleporting (0 = instant, no countdown)
  delay: 3

  # Cancel the teleport if the player moves during the countdown
  cancel-on-move: true

  # Cooldown in seconds between uses (0 = no cooldown)
  # Players with spawnhelper.spawn.nocooldown bypass this.
  cooldown: 30

  # Messages — use & colour codes, {time} is replaced with the value
  messages:
    teleporting: "&eTeleporting to spawn in &6{time}s&e..."
    cancelled:   "&c✗ Teleport cancelled! You moved."
    on-cooldown: "&cYou must wait &e{time} &cbefore using /spawn again."
    teleported:  "&a✔ Teleported to spawn!"

# ─────────────────────────────────────────────────────────────────────────────
# Greeting shown when a player enters the spawn world.
# Use & colour codes (e.g. &6, &l, &r).
# Leave a field empty ("") to skip that element.
# fade-in / stay / fade-out are in ticks (20 ticks = 1 second).
# ─────────────────────────────────────────────────────────────────────────────
greeting:
  enabled: true
  title: "&6&lWelcome to Spawn!"
  subtitle: "&7Enjoy your stay"
  action-bar: ""
  chat-message: ""
  fade-in: 10
  stay: 60
  fade-out: 10
